<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPA Calculator</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="auth.css?v=2">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ background:#081225; color:white; min-height:100vh; padding:40px; }
.container{ max-width:1450px; margin:auto; }

.title{ text-align:center; margin-bottom:40px; }
.title h1{ font-size:58px; color:#4f66ff; margin-bottom:10px; }
.title p{ color:#aab4d6; font-size:20px; }

.main{ display:flex; gap:30px; align-items:flex-start; flex-wrap:wrap; }
.card{ background:#1b2435; border-radius:28px; padding:30px; box-shadow:0 0 25px rgba(0,0,0,0.35); }
.calculator{ flex:1; min-width:900px; }
.result{ width:420px; }
.result h2{ font-size:48px; color:#4f66ff; margin-top:20px; }
.result p{ color:#b8c2e0; margin-top:10px; line-height:1.7; }

.predict-container{ display:flex; align-items:center; gap:12px; margin-bottom:25px; background:#101827; padding:16px 18px; border-radius:16px; }
.predict-container input{ width:18px; height:18px; accent-color:#4f66ff; }
.predict-container label{ color:#dbe4ff; cursor:pointer; }

.predict-grid{ display:none; grid-template-columns:1fr 1fr 1fr; gap:18px; margin-bottom:30px; }
.predict-grid input{ width:100%; }

.table-header, .row{
    display:grid;
    grid-template-columns:2fr 1fr 1fr 40px;
    gap:15px;
    margin-bottom:15px;
    align-items: center;
}
.table-header{ margin-bottom:20px; font-weight:600; color:#dfe6ff; align-items: end; }
.table-header span{ font-size:14px; color:#94a0c6; font-weight:400; display:block; }

input, select{ width:100%; background:#2d374d; border:none; outline:none; border-radius:14px; padding:14px; color:white; font-size:16px; transition: 0.2s border; border: 1px solid transparent; }
input:focus, select:focus { border-color: #4f66ff; }
input::placeholder{ color:#aab4d6; }

.delete-btn {
    background: transparent; border: none; color: #ff7d7d; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; padding: 0; width: 36px; height: 36px;
    border-radius: 10px; transition: 0.2s; margin: 0 auto;
}
.delete-btn:hover { background: rgba(239, 68, 68, 0.15); transform: scale(1.05); }

.add-row{ display:inline-block; margin-top:8px; color:#6f86ff; cursor:pointer; font-weight:500; transition:0.2s; padding: 8px 16px; border-radius: 12px; background: rgba(79, 102, 255, 0.1); }
.add-row:hover { background: rgba(79, 102, 255, 0.2); }

.button-group{ display:flex; gap:15px; margin-top:30px; flex-wrap:wrap; }
button{ border:none; cursor:pointer; padding:14px 28px; border-radius:14px; font-size:16px; font-weight:600; transition:0.2s; }
.calculate-btn{ background:linear-gradient(135deg, #4f66ff, #7b5cff); color:white; }
.calculate-btn:hover{ transform:translateY(-2px); box-shadow: 0 4px 15px rgba(79,102,255,0.4); }
.clear-btn{ background:#2d374d; color:white; }
.clear-btn:hover{ background:#3b4760; }

.grade-box{ margin-top:25px; background:#101827; border-radius:20px; padding:22px; }
.grade-box h3{ color:#9db0ff; margin-bottom:15px; }
.combo{ background:#182235; padding:16px; border-radius:14px; margin-bottom:14px; line-height:1.6; color:#dbe4ff; }
.error{ margin-top:15px; color:#ff7d7d; font-size:14px; min-height:21px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.9); } }

@media(max-width:1200px){ .calculator{ min-width:100%; } .result{ width:100%; } }
@media(max-width:768px){
    body{ padding:20px; }
    .table-header, .row, .predict-grid{ grid-template-columns:1fr; }
    .table-header { display: none; } /* Hide headers on mobile */
    .title h1{ font-size:42px; }
    .row { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 16px; position: relative; }
    .delete-btn { position: absolute; top: 15px; right: 15px; background: rgba(239, 68, 68, 0.1); }
}
</style>
</head>
<body>
<div class="container">
    <a href="index.html" class="uc-back-btn">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back to Dashboard
    </a>
    <div class="title">
        <h1>GPA Calculator</h1>
        <p>Calculate your GPA or predict future CGPA requirements</p>
    </div>
    <div class="main">
        <div class="calculator card">
            <div class="predict-container">
                <input type="checkbox" id="predictMode">
                <label for="predictMode">Predict future CGPA requirements</label>
            </div>
            
            <div class="predict-grid" id="predictGrid">
                <div>
                    <label>Current CGPA</label>
                    <input type="number" step="0.01" id="currentCGPA" placeholder="e.g. 8.2">
                </div>
                <div>
                    <label>Credits Completed</label>
                    <input type="number" id="completedCredits" placeholder="e.g. 80">
                </div>
                <div>
                    <label>Target CGPA</label>
                    <input type="number" step="0.01" id="targetCGPA" placeholder="e.g. 8.5">
                </div>
            </div>

            <div class="table-header" id="tableHeader">
                <div>Course <span>(Optional)</span></div>
                <div>Credits</div>
                <div id="gradeHeader">Grade</div>
                <div></div>
            </div>

            <div id="rows-container">
                <!-- Rows injected via JS -->
            </div>

            <span class="add-row" onclick="addRow()">+ Add Course</span>
            <div class="error" id="errorText"></div>

            <div class="button-group">
                <button class="calculate-btn" onclick="calculateGPA()">Calculate</button>
                <button class="clear-btn" onclick="clearAll()">Reset Data</button>
            </div>
        </div>

        <div class="result card">
            <svg width="60" height="60" fill="#5f8fff" viewBox="0 0 24 24" style="margin-bottom:10px;">
                <path d="M19 3H14.82C14.4 1.84 13.3 1 12 1C10.7 1 9.6 1.84 9.18 3H5C3.9 3 3 3.9 3 5V21C3 22.1 3.9 23 5 23H19C20.1 23 21 22.1 21 21V5C21 3.9 20.1 3 19 3ZM12 3C12.55 3 13 3.45 13 4C13 4.55 12.55 5 12 5C11.45 5 11 4.55 11 4C11 3.45 11.45 3 12 3ZM19 21H5V5H7V8H17V5H19V21Z"/>
            </svg>
            <h2 id="finalGPA">0.00</h2>
            <p id="gpaText">Your GPA details will appear here</p>

            <div class="grade-box">
                <h3 id="resultTitle">Details</h3>
                <div id="predictionResult">--</div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById("predictMode").addEventListener("change", () => {
    togglePredictMode();
    saveData();
});

// Auto-save listeners
document.addEventListener('input', () => {
    document.getElementById("errorText").innerHTML = ""; // Clear errors on typing
    saveData();
});
document.addEventListener('change', saveData);

function togglePredictMode() {
    const predict = document.getElementById("predictMode").checked;
    const predictGrid = document.getElementById("predictGrid");
    const gradeHeader = document.getElementById("gradeHeader");
    const rows = document.querySelectorAll(".row");

    if(predict) {
        predictGrid.style.display = "grid";
        gradeHeader.innerHTML = "Expected Range";
        rows.forEach(row => {
            if(row.querySelector(".grade")) row.querySelector(".grade").style.display = "none";
            if(row.querySelector(".expected-grade")) row.querySelector(".expected-grade").style.display = "block";
        });
    } else {
        predictGrid.style.display = "none";
        gradeHeader.innerHTML = "Grade";
        rows.forEach(row => {
            if(row.querySelector(".grade")) row.querySelector(".grade").style.display = "block";
            if(row.querySelector(".expected-grade")) row.querySelector(".expected-grade").style.display = "none";
        });
    }
}

function addRow(course = '', cred = '', gradeVal = '10', expectedVal = '') {
    const container = document.getElementById("rows-container");
    const predict = document.getElementById("predictMode").checked;
    const row = document.createElement("div");
    row.className = "row";
    row.style.animation = "fadeIn 0.3s forwards";

    const gradeHTML = `
        <select class="grade">
            <option value="10">O</option>
            <option value="9">A+</option>
            <option value="8">A</option>
            <option value="7">B+</option>
            <option value="6">B</option>
            <option value="5">P</option>
        </select>
        <input type="text" class="expected-grade" style="display:none;" placeholder="e.g. 8-10, 5, 7">
    `;

    row.innerHTML = `
        <input type="text" placeholder="Course Name" value="${course}">
        <input type="number" class="credits" placeholder="Credits (e.g. 3)" value="${cred}">
        ${gradeHTML}
        <button class="delete-btn" onclick="deleteRow(this)" title="Remove Course">🗑️</button>
    `;

    row.querySelector(".grade").value = gradeVal;
    row.querySelector(".expected-grade").value = expectedVal;
    
    if(predict) {
        row.querySelector(".grade").style.display = "none";
        row.querySelector(".expected-grade").style.display = "block";
    }

    container.appendChild(row);
    saveData();
}

function deleteRow(btn) {
    const row = btn.closest('.row');
    row.style.animation = "fadeOut 0.2s forwards";
    setTimeout(() => {
        row.remove();
        saveData();
        calculateGPA(); // Recalculate instantly
    }, 200);
}

// Parser for free-text expected grades
function parseExpectedGrade(val) {
    if (!val || val.trim() === '' || val.toLowerCase() === 'any') return [10, 9, 8, 7, 6, 5];
    
    let allowed = new Set();
    let parts = val.split(',');
    
    for(let part of parts) {
        part = part.trim();
        if (part.includes('-')) {
            let bounds = part.split('-');
            let min = parseInt(bounds[0]);
            let max = parseInt(bounds[1]);
            if (!isNaN(min) && !isNaN(max)) {
                if (min > max) { let temp = min; min = max; max = temp; }
                for (let i = min; i <= max; i++) allowed.add(i);
            }
        } else {
            let single = parseInt(part);
            if (!isNaN(single)) allowed.add(single);
        }
    }
    
    if (allowed.size === 0) return [10, 9, 8, 7, 6, 5];
    return Array.from(allowed);
}

// Recursive backtracking to find mathematically valid grade combinations within constraints
function findGradeCombinations(courses, targetPoints) {
    const gradeOptions = [
        {val: 5, name: 'P'}, {val: 6, name: 'B'}, {val: 7, name: 'B+'},
        {val: 8, name: 'A'}, {val: 9, name: 'A+'}, {val: 10, name: 'O'}
    ];


    let results = [];
    
    function search(index, currentPoints, currentCombo) {
        if (results.length >= 500) return; // Gather a pool to sort from, with a safe limit
        
        let maxRemaining = 0;
        for(let i = index; i < courses.length; i++) {
            maxRemaining += courses[i].credits * 10;
        }
        if (currentPoints + maxRemaining < targetPoints) return; // Prune dead ends
        
        if (index === courses.length) {
            if (currentPoints >= targetPoints) results.push([...currentCombo]);
            return;
        }
        
        const allowedGrades = parseExpectedGrade(courses[index].expected);
        
        for (let g of gradeOptions) {
            if (!allowedGrades.includes(g.val)) continue; // Respect the constraint
            
            currentCombo.push(g.name);
            search(index + 1, currentPoints + (g.val * courses[index].credits), currentCombo);
            currentCombo.pop();
        }
    }
    
    search(0, 0, []);
    
    // Sort results by lowest number of high grades (O, A+, etc.)
    const gradeOrder = ['O', 'A+', 'A', 'B+', 'B', 'P'];
    results.sort((a, b) => {
        for(let g of gradeOrder) {
            let countA = a.filter(x => x === g).length;
            let countB = b.filter(x => x === g).length;
            if(countA !== countB) return countA - countB;
        }
        return 0;
    });

    return results.slice(0, 5); // Return the top 5 best-fit combinations
}

function calculateGPA() {
    const predict = document.getElementById("predictMode").checked;
    const errorText = document.getElementById("errorText");
    errorText.innerHTML = "";

    const credits = document.querySelectorAll(".credits");
    if(credits.length === 0) {
        errorText.innerHTML = "Please add at least one course.";
        return;
    }

    if(!predict) {
        const grades = document.querySelectorAll(".grade");
        let totalCredits = 0;
        let weightedPoints = 0;

        for(let i = 0; i < credits.length; i++) {
            const credit = parseFloat(credits[i].value) || 0;
            const grade = parseFloat(grades[i].value);
            totalCredits += credit;
            weightedPoints += credit * grade;
        }

        if(totalCredits === 0) {
            errorText.innerHTML = "Please enter valid credits for your courses.";
            return;
        }

        const gpa = weightedPoints / totalCredits;
        document.getElementById("finalGPA").innerHTML = gpa.toFixed(2);
        document.getElementById("gpaText").innerHTML = "Calculated GPA for this semester";
        document.getElementById("predictionResult").innerHTML = "Total Credits: <b>" + totalCredits + "</b><br>Weighted Points: <b>" + weightedPoints + "</b>";
    }
    else {
        const currentCGPA = parseFloat(document.getElementById("currentCGPA").value);
        const completedCredits = parseFloat(document.getElementById("completedCredits").value);
        const targetCGPA = parseFloat(document.getElementById("targetCGPA").value);

        if(isNaN(currentCGPA) || isNaN(completedCredits) || isNaN(targetCGPA)) {
            errorText.innerHTML = "Please fill out all prediction details correctly.";
            return;
        }

        const expectedGrades = document.querySelectorAll(".expected-grade");
        let futureCredits = 0;
        let futureCourses = [];
        
        for(let i = 0; i < credits.length; i++) {
            let c = parseFloat(credits[i].value) || 0;
            futureCredits += c;
            if(c > 0) {
                futureCourses.push({
                    credits: c,
                    expected: expectedGrades[i].value
                });
            }
        }

        if(futureCredits === 0) {
            errorText.innerHTML = "Please enter valid credits for your future courses.";
            return;
        }

        const requiredTotalPoints = targetCGPA * (completedCredits + futureCredits);
        const currentPoints = currentCGPA * completedCredits;
        const requiredFuturePoints = requiredTotalPoints - currentPoints;
        const requiredGPA = requiredFuturePoints / futureCredits;

        document.getElementById("finalGPA").innerHTML = requiredGPA.toFixed(2);
        document.getElementById("gpaText").innerHTML = "Average required GPA";

        if(requiredGPA > 10) {
            document.getElementById("predictionResult").innerHTML = `<div class="combo" style="color:#ff7d7d; border: 1px solid rgba(239,68,68,0.2);">A target CGPA of ${targetCGPA} is mathematically impossible with only ${futureCredits} future credits.</div>`;
            return;
        }
        if(requiredGPA <= 0) {
            document.getElementById("predictionResult").innerHTML = `<div class="combo" style="color:#22c55e; border: 1px solid rgba(34,197,94,0.2);">You have already secured this target CGPA!</div>`;
            return;
        }

        const options = findGradeCombinations(futureCourses, requiredFuturePoints);

        let resultHTML = `<div class="combo" style="background:rgba(79,102,255,0.15); border:1px solid #4f66ff;">Minimum average required: <b>${requiredGPA.toFixed(2)}</b></div>`;

        if(options.length === 0) {
            resultHTML += `<div class="combo" style="color:#ff7d7d;">No valid grade combination was found. This target is either mathematically impossible, or your Expected Grade constraints are too strict.</div>`;
        } else {
            options.forEach((option, index) => {
                resultHTML += `
                <div class="combo">
                    <b style="color:white;">Option ${index + 1}</b><br><br>
                    Suggested Grades (in order):<br>
                    <span style="color:#9eb1ff; font-weight:600; letter-spacing:1px;">${option.join(" • ")}</span>
                </div>`;
            });
        }

        document.getElementById("predictionResult").innerHTML = resultHTML;
    }
}

function saveData() {
    const data = {
        predictMode: document.getElementById('predictMode').checked,
        currentCGPA: document.getElementById('currentCGPA').value,
        completedCredits: document.getElementById('completedCredits').value,
        targetCGPA: document.getElementById('targetCGPA').value,
        rows: []
    };
    
    document.querySelectorAll('#rows-container .row').forEach(row => {
        data.rows.push({
            course: row.querySelector('input[type="text"]').value,
            credits: row.querySelector('.credits').value,
            grade: row.querySelector('.grade') ? row.querySelector('.grade').value : "10",
            expected: row.querySelector('.expected-grade') ? row.querySelector('.expected-grade').value : ""
        });
    });
    
    localStorage.setItem('unicompass_gpa', JSON.stringify(data));
}

function loadData() {
    const raw = localStorage.getItem('unicompass_gpa');
    const container = document.getElementById('rows-container');
    container.innerHTML = '';

    if(raw) {
        try {
            const data = JSON.parse(raw);
            document.getElementById('predictMode').checked = data.predictMode;
            document.getElementById('currentCGPA').value = data.currentCGPA || '';
            document.getElementById('completedCredits').value = data.completedCredits || '';
            document.getElementById('targetCGPA').value = data.targetCGPA || '';
            
            data.rows.forEach(r => {
                let expected = r.expected === "any" ? "" : r.expected;
                addRow(r.course, r.credits, r.grade, expected);
            });
            togglePredictMode();
        } catch(e) {
            initDefaultRows();
        }
    } else {
        initDefaultRows();
    }
}

function initDefaultRows() {
    addRow('', '', '10', '');
    addRow('', '', '10', '');
    addRow('', '', '10', '');
}

function clearAll() {
    if(!confirm("Are you sure you want to completely reset all your data?")) return;
    localStorage.removeItem('unicompass_gpa');
    document.querySelectorAll("input").forEach(i => { if(i.type !== "checkbox") i.value = ""; });
    document.getElementById("predictMode").checked = false;
    document.getElementById("rows-container").innerHTML = "";
    initDefaultRows();
    togglePredictMode();
    document.getElementById("finalGPA").innerHTML = "0.00";
    document.getElementById("gpaText").innerHTML = "Your GPA details will appear here";
    document.getElementById("predictionResult").innerHTML = "--";
    document.getElementById("errorText").innerHTML = "";
}

// Initialize on load
window.addEventListener('DOMContentLoaded', loadData);

</script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
</body>
</html>
