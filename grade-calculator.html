<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grade Calculator</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="auth.css?v=2">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#081225;
    color:white;
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:1450px;
    margin:auto;
}

.title{
    text-align:center;
    margin-bottom:40px;
}

.title h1{
    font-size:58px;
    color:#4f66ff;
    margin-bottom:10px;
}

.title p{
    color:#aab4d6;
    font-size:20px;
}

.main{
    display:flex;
    gap:30px;
    align-items:flex-start;
    flex-wrap:wrap;
}

.card{
    background:#1b2435;
    border-radius:28px;
    padding:30px;
    box-shadow:0 0 25px rgba(0,0,0,0.35);
}

.calculator{
    flex:1;
    min-width:880px;
}

.result{
    width:360px;
    text-align:center;
}

.result h2{
    font-size:42px;
    margin-top:25px;
    color:#4f66ff;
}

.result p{
    margin-top:10px;
    color:#b8c2e0;
    line-height:1.7;
}

.table-header,
.row{
    display:grid;
    grid-template-columns:2fr 1fr 1fr 1fr;
    gap:15px;
    margin-bottom:15px;
}

.table-header{
    margin-bottom:20px;
    color:#dfe6ff;
    font-weight:600;
    font-size:18px;
}

.table-header span{
    color:#94a0c6;
    font-size:14px;
    font-weight:400;
}

input{
    width:100%;
    background:#2d374d;
    border:none;
    outline:none;
    border-radius:14px;
    padding:14px;
    color:white;
    font-size:16px;
}

input::placeholder{
    color:#aeb7d0;
}

select{
    width:100%;
    background:#2d374d;
    border:none;
    outline:none;
    border-radius:14px;
    padding:14px;
    color:white;
    font-size:16px;
}

.add-row{
    margin-top:10px;
    margin-bottom:15px;
    color:#6f86ff;
    cursor:pointer;
    display:inline-block;
    font-weight:500;
}

#weightError{
    margin-top:10px;
    color:#ff7b7b;
    font-size:14px;
    font-weight:500;
}

.section-title{
    font-size:28px;
    margin-top:35px;
    margin-bottom:20px;
    color:#4f66ff;
}

.section-title span{
    font-size:16px;
    color:#94a0c6;
    font-weight:400;
}

.final-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:25px;
}

.button-group{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

button{
    border:none;
    cursor:pointer;
    padding:14px 28px;
    border-radius:14px;
    font-size:16px;
    font-weight:600;
    transition:0.2s;
}

.calculate-btn{
    background:#4f66ff;
    color:white;
}

.calculate-btn:hover{
    background:#6278ff;
    transform:translateY(-2px);
}

.clear-btn{
    background:#2d374d;
    color:white;
}

.clear-btn:hover{
    background:#3a4560;
}

.grade-box{
    margin-top:25px;
    background:#101827;
    border-radius:20px;
    padding:20px;
}

.grade-box h3{
    color:#9db0ff;
    margin-bottom:10px;
}

.grade-box p{
    font-size:18px;
}

.predict-container{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:25px;
    background:#101827;
    padding:16px 18px;
    border-radius:16px;
}

.predict-container input[type="checkbox"]{
    width:18px;
    height:18px;
    accent-color:#4f66ff;
}

.predict-container label{
    color:#dbe4ff;
    font-size:15px;
    cursor:pointer;
}

@media(max-width:1200px){

    .calculator{
        min-width:100%;
    }

    .result{
        width:100%;
    }
}

@media(max-width:768px){

    body{
        padding:20px;
    }

    .table-header,
    .row{
        grid-template-columns:1fr;
    }

    .title h1{
        font-size:42px;
    }

    .final-grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="container">

    <a href="index.html" class="uc-back-btn">
        <div class="back-arrow">&#8592;</div>
        Back to Dashboard
    </a>

    <div class="title">

        <h1>
            Grade Calculator
        </h1>

        <p>
            Calculate your grade or predict future score requirements
        </p>

    </div>

    <div class="main">

        <div class="calculator card">

            <div class="predict-container">

                <input
                    type="checkbox"
                    id="predictMode"
                >

                <label for="predictMode">
                    Predict future score requirements
                </label>

            </div>

            <div class="table-header">

                <div>
                    Assignment / Exam
                    <span>(Optional)</span>
                </div>

                <div>
                    Marks Scored
                </div>

                <div>
                    Out Of
                </div>

                <div>
                    Weight (%)
                </div>

            </div>

            <div id="rows-container">

                <div class="row">

                    <input
                        type="text"
                        placeholder="CIA 1"
                    >

                    <input
                        type="number"
                        class="score"
                        placeholder="18"
                    >

                    <input
                        type="number"
                        class="outof"
                        placeholder="20"
                    >

                    <input
                        type="number"
                        class="weight"
                        placeholder="10"
                    >

                </div>

                <div class="row">

                    <input
                        type="text"
                        placeholder="Mid Sem"
                    >

                    <input
                        type="number"
                        class="score"
                        placeholder="42"
                    >

                    <input
                        type="number"
                        class="outof"
                        placeholder="50"
                    >

                    <input
                        type="number"
                        class="weight"
                        placeholder="30"
                    >

                </div>

                <div class="row">

                    <input
                        type="text"
                        placeholder="CIA 2"
                    >

                    <input
                        type="number"
                        class="score"
                        placeholder="17"
                    >

                    <input
                        type="number"
                        class="outof"
                        placeholder="20"
                    >

                    <input
                        type="number"
                        class="weight"
                        placeholder="10"
                    >

                </div>

            </div>

            <span
                class="add-row"
                onclick="addRow()"
            >
                + Add More Rows
            </span>

            <div id="weightError"></div>

            <div
                id="predictionSection"
                style="display:none;"
            >

                <h2 class="section-title">
                    Target Grade
                </h2>

                <div class="final-grid">

                    <div>

                        <label>
                            Final Grade Goal
                        </label>

                        <select id="goalGrade">

                            <option value="91">
                                O (91 - 100)
                            </option>

                            <option value="81">
                                A+ (81 - 90)
                            </option>

                            <option value="71">
                                A (71 - 80)
                            </option>

                            <option value="61">
                                B+ (61 - 70)
                            </option>

                            <option value="51">
                                B (51 - 60)
                            </option>

                            <option value="41">
                                P (41 - 50)
                            </option>

                        </select>

                    </div>

                </div>

            </div>

            <div class="button-group">

                <button
                    class="calculate-btn"
                    onclick="calculateGrade()"
                >
                    Calculate
                </button>

                <button
                    class="clear-btn"
                    onclick="clearAll()"
                >
                    Clear
                </button>

            </div>

        </div>

        <div class="result card">

            <svg
                width="80"
                height="80"
                fill="#5f8fff"
                viewBox="0 0 24 24"
            >
                <path d="M19 3H14.82C14.4 1.84 13.3 1 12 1C10.7 1 9.6 1.84 9.18 3H5C3.9 3 3 3.9 3 5V21C3 22.1 3.9 23 5 23H19C20.1 23 21 22.1 21 21V5C21 3.9 20.1 3 19 3ZM12 3C12.55 3 13 3.45 13 4C13 4.55 12.55 5 12 5C11.45 5 11 4.55 11 4C11 3.45 11.45 3 12 3ZM19 21H5V5H7V8H17V5H19V21Z"/>
            </svg>

            <h2 id="finalPercentage">
                0%
            </h2>

            <p id="letterGrade">
                Your grade details will appear here
            </p>

            <div class="grade-box">

                <h3 id="resultTitle">
                    Grade Information
                </h3>

                <p id="requiredMarks">
                    --
                </p>

            </div>

        </div>

    </div>

</div>

<script>

let assignmentCount = 1;

document
    .getElementById("predictMode")
    .addEventListener("change", function()
{
    const predictionSection =
        document.getElementById("predictionSection");

    if(this.checked)
        predictionSection.style.display = "block";

    else
        predictionSection.style.display = "none";
});

function addRow()
{
    const container =
        document.getElementById("rows-container");

    const row =
        document.createElement("div");

    row.className = "row";

    const currentRows =
        container.querySelectorAll(".row").length;

    let placeholderText = "";

    if(currentRows === 3)
        placeholderText = "End Sem";

    else
    {
        placeholderText =
            "Assignment " + assignmentCount;

        assignmentCount++;
    }

    row.innerHTML = `
        <input
            type="text"
            placeholder="${placeholderText}"
        >

        <input
            type="number"
            class="score"
            placeholder="0"
        >

        <input
            type="number"
            class="outof"
            placeholder="100"
        >

        <input
            type="number"
            class="weight"
            placeholder="0"
        >
    `;

    container.appendChild(row);
}

function getLetterGrade(mark)
{
    if(mark >= 91)
        return "O";

    if(mark >= 81)
        return "A+";

    if(mark >= 71)
        return "A";

    if(mark >= 61)
        return "B+";

    if(mark >= 51)
        return "B";

    if(mark >= 41)
        return "P";

    return "F";
}

function calculateGrade()
{
    const scores =
        document.querySelectorAll(".score");

    const outofs =
        document.querySelectorAll(".outof");

    const weights =
        document.querySelectorAll(".weight");

    const predictMode =
        document.getElementById("predictMode").checked;

    let currentContribution = 0;

    let completedWeight = 0;

    let totalWeight = 0;

    for(let i = 0; i < scores.length; i++)
    {
        const scoreValue =
            scores[i].value.trim();

        const outofValue =
            outofs[i].value.trim();

        const weightValue =
            weights[i].value.trim();

        const weight =
            parseFloat(weightValue) || 0;

        totalWeight += weight;

        if(
            scoreValue !== "" &&
            outofValue !== "" &&
            weightValue !== ""
        )
        {
            const score =
                parseFloat(scoreValue);

            const outof =
                parseFloat(outofValue);

            const percentage =
                (score / outof) * 100;

            currentContribution +=
                (percentage * weight) / 100;

            completedWeight += weight;
        }
    }

    const errorDiv =
        document.getElementById("weightError");

    if(!predictMode && totalWeight !== 100)
    {
        errorDiv.innerHTML =
            "Total weightage must add up to 100%";

        document.getElementById(
            "finalPercentage"
        ).innerHTML = "--";

        document.getElementById(
            "letterGrade"
        ).innerHTML =
            "Please correct the weight distribution";

        return;
    }

    errorDiv.innerHTML = "";

    const currentGrade =
        completedWeight > 0
        ?
        (
            currentContribution /
            completedWeight
        ) * 100
        :
        0;

    document.getElementById(
        "finalPercentage"
    ).innerHTML =
        currentGrade.toFixed(2) + "%";

    document.getElementById(
        "letterGrade"
    ).innerHTML =
        "Current Grade: <b>" +
        getLetterGrade(currentGrade) +
        "</b>";

    if(predictMode)
    {
        const target =
            parseFloat(
                document.getElementById(
                    "goalGrade"
                ).value
            );

        const remainingWeight =
            100 - completedWeight;

        let requiredMarks =
            (
                (
                    target -
                    currentContribution
                )
                /
                remainingWeight
            ) * 100;

        document.getElementById(
            "resultTitle"
        ).innerHTML =
            "Prediction Result";

        let resultText = "";

        if(remainingWeight <= 0)
        {
            resultText =
                "No remaining assessments left";
        }

        else if(requiredMarks <= 0)
        {
            resultText =
                "Target already achieved";
        }

        else if(requiredMarks > 100)
        {
            resultText =
                "Target grade is not achievable";
        }

        else
        {
            requiredMarks =
                Math.ceil(requiredMarks);

            resultText =
                "Minimum marks required in remaining assessments:<br><br>" +
                "<b>" +
                requiredMarks +
                "%</b> to achieve <b>" +
                getLetterGrade(target) +
                "</b>";
        }

        document.getElementById(
            "requiredMarks"
        ).innerHTML =
            resultText;
    }

    else
    {
        document.getElementById(
            "resultTitle"
        ).innerHTML =
            "Final Grade";

        document.getElementById(
            "requiredMarks"
        ).innerHTML =
            "Overall Grade: <b>" +
            getLetterGrade(currentGrade) +
            "</b>";
    }
}

function clearAll()
{
    document
        .querySelectorAll("input")
        .forEach(input =>
    {
        if(input.type !== "checkbox")
            input.value = "";
    });

    document.getElementById(
        "predictMode"
    ).checked = false;

    document.getElementById(
        "predictionSection"
    ).style.display = "none";

    document.getElementById(
        "goalGrade"
    ).selectedIndex = 0;

    document.getElementById(
        "weightError"
    ).innerHTML = "";

    document.getElementById(
        "finalPercentage"
    ).innerHTML = "0%";

    document.getElementById(
        "letterGrade"
    ).innerHTML =
        "Your grade details will appear here";

    document.getElementById(
        "requiredMarks"
    ).innerHTML = "--";

    document.getElementById(
        "resultTitle"
    ).innerHTML =
        "Grade Information";
}

</script>

<script src="firebase-config.js"></script>
<script src="auth.js"></script>

</body>
</html>
