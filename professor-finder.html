<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professor Finder</title>

<link rel="icon" type="image/png" href="favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="auth.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#081225;
    color:white;
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:1500px;
    margin:auto;
}

.title{
    text-align:center;
    margin-bottom:40px;
}

.title h1{
    font-size:58px;
    color:#4f66ff;
    margin-bottom:10px;
}

.title p{
    color:#aab4d6;
    font-size:20px;
}

.filters{
    background:#1b2435;
    border-radius:26px;
    padding:25px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:35px;
    box-shadow:0 0 25px rgba(0,0,0,0.35);
}

.search-box{
    flex:1;
    min-width:280px;
}

input,
select{
    width:100%;
    background:#2d374d;
    border:none;
    outline:none;
    border-radius:16px;
    padding:16px;
    color:white;
    font-size:16px;
}

input::placeholder{
    color:#aeb7d0;
}

.professor-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(520px,1fr));
    gap:18px;
}

.card{
    background:#141b29;
    border-radius:24px;
    padding:18px 20px;
    box-shadow:0 0 18px rgba(0,0,0,0.28);
    transition:0.2s;
    border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
    transform:translateY(-3px);
}

.top{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:14px;
}

.profile-link{
    text-decoration:none;
}

.profile-image{
    width:72px;
    height:72px;
    min-width:72px;
    min-height:72px;
    border-radius:50%;
    border:2px solid #4f66ff;
    pointer-events:auto;
    user-select:none;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;
    font-weight:700;
    color:white;

    background:
    linear-gradient(
        135deg,
        #4f66ff,
        #7b8cff
    );

    overflow:hidden;
    transition:0.2s;
}

.profile-image:hover{
    transform:scale(1.05);
    box-shadow:0 0 18px rgba(79,102,255,0.45);
}

.name{
    font-size:22px;
    font-weight:600;
    line-height:1.1;
}

.role{
    margin-top:6px;
    display:inline-block;
    background:#101827;
    color:#9eb1ff;
    padding:5px 11px;
    border-radius:10px;
    font-size:12px;
    font-weight:500;
}

.info{
    margin-top:0;
}

.info-item{
    margin-bottom:10px;
}

.label{
    color:#7f8aa8;
    font-size:11px;
    margin-bottom:1px;
    text-transform:uppercase;
    letter-spacing:0.5px;
}

.value{
    font-size:15px;
    color:#e8ecff;
    line-height:1.15;
}

.email-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
}

.copy-btn{
    width:30px;
    height:30px;
    border:none;
    border-radius:8px;
    background:#202b42;
    color:#c7d2ff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.2s;
    flex-shrink:0;
}

.copy-btn:hover{
    background:#31415f;
    color:white;
}

.copy-btn svg{
    width:16px;
    height:16px;
}

#toast{
    position:fixed;
    bottom:30px;
    right:30px;
    background:#1b2435;
    color:#dbe4ff;
    padding:14px 18px;
    border-radius:14px;
    font-size:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.35);
    opacity:0;
    pointer-events:none;
    transform:translateY(20px);
    transition:0.25s;
    z-index:9999;
}

#toast.show{
    opacity:1;
    transform:translateY(0);
}

.empty{
    text-align:center;
    color:#aab4d6;
    margin-top:60px;
    font-size:22px;
}

@media(max-width:768px){

    body{
        padding:18px;
    }

    .title h1{
        font-size:40px;
    }

    .filters{
        flex-direction:column;
    }

    .professor-grid{
        grid-template-columns:1fr;
    }

    .card{
        padding:18px;
    }

    .top{
        gap:14px;
    }

    .name{
        font-size:21px;
    }

    .profile-image{
        width:64px;
        height:64px;
        min-width:64px;
        min-height:64px;
        font-size:20px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="title">

        <h1>
            Professor Finder
        </h1>

        <p>
            Search faculty members by name or department
        </p>

    </div>

    <div class="filters">

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Search professor name..."
            >

        </div>

        <div class="search-box">

            <select id="departmentFilter">

                <option value="all">
                    All Departments
                </option>

            </select>

        </div>

    </div>

    <div
        class="professor-grid"
        id="professorGrid"
    ></div>

    <div
        class="empty"
        id="emptyMessage"
        style="display:none;"
    >
        No professors found
    </div>

</div>

<div id="toast">
    E-Mail Copied!
</div>

<script>

document.addEventListener(
    "contextmenu",
    event => event.preventDefault()
);

let professors = [];

async function loadProfessors()
{
    try
    {
        const response =
            await fetch("professors.json");

        professors =
            await response.json();

        populateDepartments();

        renderProfessors(professors);
    }

    catch(error)
    {
        console.error(
            "Error loading professors:",
            error
        );
    }
}

function populateDepartments()
{
    const departmentFilter =
        document.getElementById(
            "departmentFilter"
        );

    const departments =
        [...new Set(
            professors.map(
                professor =>
                professor.department
            )
        )];

    departments.sort();

    departments.forEach(department =>
    {
        const option =
            document.createElement("option");

        option.value = department;

        option.textContent = department;

        departmentFilter.appendChild(option);
    });
}

function renderProfessors(data)
{
    const grid =
        document.getElementById(
            "professorGrid"
        );

    const emptyMessage =
        document.getElementById(
            "emptyMessage"
        );

    grid.innerHTML = "";

    if(data.length === 0)
    {
        emptyMessage.style.display =
            "block";

        return;
    }

    emptyMessage.style.display =
        "none";

    data.forEach(professor =>
    {
        const card =
            document.createElement("div");

        card.className = "card";

        const initials =
            professor.photo
            ?.trim()
            ?.toUpperCase()
            || "NA";

        const website =
            professor.website
            ||
            (
                "https://www.snuchennai.edu.in/faculty/" +
                professor.name
                .toLowerCase()
                .replaceAll(".", "")
                .replaceAll(" ", "-")
                + "/"
            );

        card.innerHTML = `

            <div class="top">

                <a
                    href="${website}"
                    target="_blank"
                    title="Go to Website"
                    class="profile-link"
                >

                    <div
                        class="profile-image"
                    >
                        ${initials}
                    </div>

                </a>

                <div>

                    <div class="name">
                        ${professor.name}
                    </div>

                    <div class="role">
                        ${professor.role}
                    </div>

                </div>

            </div>

            <div class="info">

                <div class="info-item">

                    <div class="label">
                        Room
                    </div>

                    <div class="value">
                        ${professor.room}
                    </div>

                </div>

                <div class="info-item">

                    <div class="label">
                        Department
                    </div>

                    <div class="value">
                        ${professor.department}
                    </div>

                </div>

                <div class="info-item">

                    <div class="label">
                        Email
                    </div>

                    <div class="email-row">

                        <div class="value">
                            ${professor.email}
                        </div>

                        <button
                            class="copy-btn"
                            onclick="copyEmail('${professor.email}')"
                            title="Copy Email"
                        >

                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >

                                <rect
                                    x="9"
                                    y="9"
                                    width="13"
                                    height="13"
                                    rx="2"
                                ></rect>

                                <path
                                    d="M5 15H4
                                    a2 2 0 0 1-2-2V4
                                    a2 2 0 0 1 2-2h9
                                    a2 2 0 0 1 2 2v1"
                                ></path>

                            </svg>

                        </button>

                    </div>

                </div>

            </div>

        `;

        grid.appendChild(card);
    });
}

function copyEmail(email)
{
    navigator.clipboard.writeText(email);

    const toast =
        document.getElementById("toast");

    toast.classList.add("show");

    setTimeout(() =>
    {
        toast.classList.remove("show");
    }, 1800);
}

function filterProfessors()
{
    const searchValue =
        document
        .getElementById("searchInput")
        .value
        .toLowerCase();

    const departmentValue =
        document
        .getElementById("departmentFilter")
        .value;

    const filtered =
        professors.filter(professor =>
    {
        const matchesSearch =
            professor.name
            .toLowerCase()
            .includes(searchValue);

        const matchesDepartment =
            departmentValue === "all"
            ||
            professor.department === departmentValue;

        return (
            matchesSearch &&
            matchesDepartment
        );
    });

    renderProfessors(filtered);
}

document
    .getElementById("searchInput")
    .addEventListener(
        "input",
        filterProfessors
    );

document
    .getElementById("departmentFilter")
    .addEventListener(
        "change",
        filterProfessors
    );

loadProfessors();

</script>

<script src="auth.js"></script>

</body>
</html>
